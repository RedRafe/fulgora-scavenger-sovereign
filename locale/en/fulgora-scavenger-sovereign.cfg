    ionized-sludge=Ionized sludge
    superheated-heavy-oil=Superheated heavy oil

[fluid-description]
    dirty-electrolyte=Electrolyte contaminated by catalytic slurry dissolution. Scrub it to recover clean electrolyte, at the cost of toxic tar.
    ionized-sludge=Heavy oil electromagnetically sifted for the charged particulates suspended in it. Centrifuge it to recover metallic slurry and mineral silt.
    superheated-heavy-oil=Heavy oil induction-heated far past its cracking point. Must stay hot: dehydration requires at least 300°C.

