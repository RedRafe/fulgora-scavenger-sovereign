[item-description]
    carbon-coke=Vitrified carbon residue wrung out of superheated heavy oil. Burns hot, or can be refined into pure carbon.
    crushed-holmium=Holmium ore crushed into fine crystalline shards, ready for efficient liquefaction.
    insulated-arc-crucible=A holmium-lined, glass-insulated vessel that survives sustained electric arcs. The highest engineering legacy of Fulgora's lost civilization.
    metallic-slurry=Wet, conductive sludge dredged from Fulgora's oil seas, dense with dissolved metals scavenged by a long-dead civilization's runoff. Leach it to recover iron, copper and traces of holmium.
    mineral-silt=Fine sediment separated from ionized sludge. Sift it to recover stone and silica sand.
    quartz-glass-plate=Clear structural glass vitrified from silica sand — a rediscovered staple of ancient Fulgoran engineering.
    silica-sand=Pale, glassy sand sifted from mineral silt. The feedstock of Fulgoran glassmaking.
    toxic-tar=Congealed chemical waste scrubbed out of spent electrolyte. High energy density, but burning it releases intense local pollution.

