[recipe-description]
    advanced-electromagnetic-science-pack=The capstone of the Fulgoran overhaul: quartz-glass vacuum envelopes double pack output and re-enable productivity modules.
    dirty-electrolyte=Electrolyte-catalyzed dissolution recovers far more ore from the same slurry, but contaminates the electrolyte in the process.
    quartz-glass-plate=An emergency bootstrap: smelt raw stone directly into low-grade glass. Deliberately wasteful — sifted silica sand is far more efficient.
    slurry-acid-leaching=Crude acid leaching of metallic slurry using heavy oil. Works anywhere, but recovers only a fraction of the dissolved metals.
    toxic-tar=Closes the catalyst loop: reclaims most of the electrolyte and squeezes the contaminants out as toxic tar.

