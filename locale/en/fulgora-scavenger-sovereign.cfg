[technology-description]
    advanced-electromagnetic-science=Reconstruct the ancients' vacuum-envelope instrumentation: doubled electromagnetic science pack output with productivity re-enabled.
    carbon-plastics=Synthesize plastic directly from carbon and light oil — a fully Fulgoran plastic supply.
    carbon-synthesis=Refine carbon coke into pure carbon without importing coal.
    catalytic-dissolution=Use electrolyte as a catalyst to dissolve metallic slurry with far greater ore yield — at the cost of dirtying the catalyst.
    electrolyte-scrubbing=Scrub dirty electrolyte clean again, closing the catalyst loop and concentrating the waste into toxic tar.
    electromagnetic-sifting=Sift Fulgora's infinite heavy oil seas with electromagnetic grids to draw out the ionized sludge suspended within.
    fulgoran-scavenging=Digging through the ruins reveals the first trick of the ancients: stone can be smelted into crude glass in an emergency.
    holmium-crushing=Crush holmium ore into fine shards for far more efficient downstream processing.
    holmium-extraction=Precipitate holmium ore directly out of metallic slurry.
    holmium-liquefaction=Dissolve crushed holmium into holmium solution at parity with raw-ore processing, wasting nothing.
    insulated-arc-infrastructure=Combine quartz glass and crushed holmium into insulated arc crucibles, the ancients' highest engineering achievement.
    silica-vitrification=Vitrify silica sand into clean quartz glass plates — the proper successor to crude stone smelting.
    silt-sifting=Separate mineral silt into stone and silica sand.
    sludge-centrifuging=Spin ionized sludge apart into metallic slurry and mineral silt, recovering most of the carrier oil.
    slurry-leaching=Leach iron and copper ore out of metallic slurry with a crude heavy-oil acid bath.
    superheated-heavy-oil=Induction-heat heavy oil far past its cracking point, opening the door to temperature-gated pyrolysis.
    thermal-dehydration=Wring water, light oil and carbon coke out of superheated heavy oil.
